appId: com.wax.app
productName: Wax
directories:
  output: release
files:
  - electron/**/*
  - server.js
  - package.json
  - "!**/*.map"
  - "!**/*.ts"

# dist/ ships outside asar so the forked Express child can serve it with
# plain fs (no asar fs hooks in the child process). yt-dlp + ffmpeg are
# optional bundles under build/bin/<platform>/; if absent we use system PATH.
extraResources:
  - from: "dist"
    to: "dist"
    filter:
      - "**/*"
  - from: "build/bin/${os}/${arch}/"
    to: "bin/"
    filter:
      - "**/*"

mac:
  category: public.app-category.music
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  title: "Wax"
  icon: build/icon.icns

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

linux:
  category: AudioVideo
  maintainer: "Dylan <encheres.nc@gmail.com>"
  # Note: rpm target requires a native rpmbuild on Linux (electron-builder's
  # bundled fpm 1.9.3 is incompatible with macOS rpm 4.20+); Fedora/RedHat
  # users can run the AppImage instead.
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64

asar: true
compression: normal
