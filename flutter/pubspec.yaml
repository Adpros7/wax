name: wax_mobile
description: "Wax mobile — iOS music player wrapping the same backend as the desktop Electron app."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.0

  # HTTP
  dio: ^5.7.0

  # Audio playback + iOS lock-screen / Control Center integration
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  audio_session: ^0.2.3

  # Misc
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
